<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — SmartCredit AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
<script>document.documentElement.setAttribute('data-theme',(document.cookie.match(/smartcredit-theme=(dark|light)/)||[])[1]||'light');</script>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-side">
    <div class="auth-side-content">
      <div class="brand" style="color:#fff;"><div class="brand-mark" style="background:rgba(255,255,255,0.2); box-shadow:none;">SC</div><span>SmartCredit AI</span></div>
      <h2>Forgot your password?</h2>
      <p>No problem — enter your email and we'll send you a secure reset link.</p>
    </div>
  </div>
  <div class="auth-form-side">
    <div class="auth-form-box fade-up">
      <a href="{{ url_for('main.landing') }}" class="brand"><div class="brand-mark">SC</div><span>SmartCredit <span class="gradient-text">AI</span></span></a>
      <h1>Reset your password</h1>
      <p class="subtitle">We'll email you a link to reset your password.</p>
      <form method="POST" action="{{ url_for('auth.forgot_password') }}">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control" placeholder="you@bank.com" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Send Reset Link</button>
      </form>
      <p class="auth-footer-link"><a href="{{ url_for('auth.login') }}" style="color:var(--brand); font-weight:600;">← Back to log in</a></p>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
